name: Tests

on:
  push:
    branches:
      - main
      - '*.x'
  pull_request:
    branches:
      - main
      - '*.x'

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 10 (minimum supported)
          - php: '8.2'
            laravel: '10.*'
            testbench: '8.*'
          - php: '8.3'
            laravel: '10.*'
            testbench: '8.*'
          # Laravel 11
          - php: '8.2'
            laravel: '11.*'
            testbench: '9.*'
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
          # Laravel 12
          - php: '8.2'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
          # Laravel 13 (latest)
          - php: '8.2'
            laravel: '13.*'
            testbench: '11.*'
          - php: '8.3'
            laravel: '13.*'
            testbench: '11.*'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl, mbstring, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction \
            --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test

      - name: Run static analysis
        run: composer analyse
        continue-on-error: true
